  build-wrappers-linux:
    runs-on: ubuntu-latest
    name: Build linux wrappers
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Build wrappers
        env:
          REALM_CMAKE_CONFIGURATION: Release
        run: wrappers/build.sh

  build-wrappers-android:
    runs-on: ubuntu-latest
    name: Build Android wrappers
    strategy:
      matrix:
        arch: [armeabi-v7a, arm64-v8a, x86, x86_64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Build wrappers
        run: wrappers/build-android.sh --configuration=Release --ARCH=${{ matrix.arch }}
